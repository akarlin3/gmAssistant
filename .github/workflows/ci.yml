name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      # `next build` reads the public Firebase config at build time. These are
      # public (NEXT_PUBLIC_*) values by design, so stable CI dummies are safe
      # and keep the build hermetic. Real values are injected at deploy time.
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:cidummy'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
