# Google Cloud Build pipeline for gamemaster-builder.
#
# Runs every check that protects production:
#   1. install      — deterministic dependency install (npm ci)
#   2. typecheck    — strict TypeScript pass (tsc --noEmit)
#   3. lint         — next lint (eslint + tailwind plugin)
#   4. test:node    — node --test suites under lib/ (pure-logic tests)
#   5. test:vitest  — vitest run (React component + API route tests)
#   6. build        — full `next build` (catches route/RSC/PWA regressions)
#
# Trigger this via a Cloud Build trigger on push / pull_request. The build
# is hermetic: each step shares /workspace, so the node_modules created in
# step 1 is reused by every later step.

timeout: 1800s  # 30 minutes — `next build` + tests comfortably fit.

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  env:
    - 'CI=true'
    - 'NODE_ENV=test'
    # `next build` requires the public Firebase config to be present at
    # build time (the client bundle reads them via process.env). These are
    # *public* values by design (NEXT_PUBLIC_*), so using stable dummies
    # here is safe and keeps the build hermetic. Production values are
    # injected by App Hosting at runtime.
    - 'NEXT_PUBLIC_FIREBASE_API_KEY=ci-dummy-api-key'
    - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=ci-dummy.firebaseapp.com'
    - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=ci-dummy-project'
    - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=ci-dummy.appspot.com'
    - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=000000000000'
    - 'NEXT_PUBLIC_FIREBASE_APP_ID=1:000000000000:web:cidummy'
    # Disable Next.js anonymous telemetry in CI.
    - 'NEXT_TELEMETRY_DISABLED=1'

steps:
  - id: install
    name: 'node:20'
    entrypoint: npm
    args: ['ci', '--no-audit', '--no-fund']

  - id: typecheck
    name: 'node:20'
    entrypoint: npx
    args: ['tsc', '--noEmit']
    waitFor: ['install']

  - id: lint
    name: 'node:20'
    entrypoint: npm
    args: ['run', 'lint']
    waitFor: ['install']

  - id: test-node
    name: 'node:20'
    entrypoint: npm
    args: ['run', 'test:node']
    waitFor: ['install']

  - id: test-vitest
    name: 'node:20'
    entrypoint: npm
    args: ['run', 'test:vitest']
    waitFor: ['install']

  - id: build
    name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    # Build last so a typecheck/lint/test failure short-circuits the slow step.
    waitFor: ['typecheck', 'lint', 'test-node', 'test-vitest']
