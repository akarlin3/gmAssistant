<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic Silver Gradient -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="20%" stop-color="#dddddd" />
      <stop offset="40%" stop-color="#b8b8b8" />
      <stop offset="60%" stop-color="#f2f2f2" />
      <stop offset="80%" stop-color="#9e9e9e" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    
    <!-- Rich Charcoal/Black Gradient -->
    <linearGradient id="blackRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333333" />
      <stop offset="30%" stop-color="#1a1a1a" />
      <stop offset="70%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#151515" />
    </linearGradient>
    
    <!-- Light Gleam Overlay -->
    <linearGradient id="gleamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- Drop Shadow for depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Hollow Ring Group with drop shadow -->
  <g filter="url(#dropShadow)">
    <!-- Outer/Inner Silver base ring -->
    <path fill="url(#silverGrad)" fill-rule="evenodd" clip-rule="evenodd" 
          d="M 256,72 A 184,184 0 1,0 256,440 A 184,184 0 1,0 256,72 Z M 256,160 A 96,96 0 1,1 256,352 A 96,96 0 1,1 256,160 Z" />
    
    <!-- Inner Black ring body -->
    <path fill="url(#blackRingGrad)" fill-rule="evenodd" clip-rule="evenodd" 
          d="M 256,80 A 176,176 0 1,0 256,432 A 176,176 0 1,0 256,80 Z M 256,152 A 104,104 0 1,1 256,360 A 104,104 0 1,1 256,152 Z" />
          
    <!-- Gleam overlay for premium metallic reflection -->
    <path fill="url(#gleamGrad)" fill-rule="evenodd" clip-rule="evenodd" 
          d="M 256,72 A 184,184 0 1,0 256,440 A 184,184 0 1,0 256,72 Z M 256,160 A 96,96 0 1,1 256,352 A 96,96 0 1,1 256,160 Z" />
  </g>
</svg>
